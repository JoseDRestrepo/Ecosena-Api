services:
  ecosena-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosena_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DbConn=Server=mysql-141504c1-joserestrepo-48f4.k.aivencloud.com;Port=27666;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};SslMode=Required
      - ConnectionStrings__SenaConn=Server=mysql-141504c1-joserestrepo-48f4.k.aivencloud.com;Port=27666;Database=${MYSQL_SENA_DATABASE};User=${MYSQL_SENA_USER};Password=${MYSQL_SENA_PASSWORD};SslMode=Required
      - JwtConfig__Key=${JWT_KEY}
      - JwtConfig__Issuer=${JWT_ISSUER}
      - JwtConfig__Audience=${JWT_AUDIENCE}
      - JwtConfig__TokenValidityMins=${JWT_VALIDITY_MINS}
      - APRENDIZ_PASSWORD=${APRENDIZ_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD} 
      - Cloudinary__CloudName=${CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUD_API_KEY}
      - Cloudinary__ApiSecret=${CLOUD_API_SECRET}
      - Email__From=${EMAIL_FROM}
      - Email__FromName=ECOSENA
      - Brevo__ApiKey=${BREVO_APIKEY}
    networks:
      - ecosena_backend

networks:
  ecosena_backend:
    driver: bridge